name: ci

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install
        run: npm ci
      - name: Typecheck
        run: npm run check-types
      - name: Test
        run: npm run test
      - name: Coverage
        run: npm run test:coverage
      - name: Build
        run: npm run build

  docker:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t copilot-for-readmes:ci .
      - name: Smoke test
        run: |
          docker run -d --name cfr -p 8092:8092 copilot-for-readmes:ci
          for i in {1..30}; do
            if curl -fsS http://localhost:8092/health; then echo OK; break; fi
            sleep 1
          done
          curl -fsS http://localhost:8092/ready
          docker logs cfr
          docker rm -f cfr

  publish:
    needs: docker
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/copilot-for-readmes
          TAG=${GITHUB_REF_NAME}
          docker build -t $IMAGE:$TAG -t $IMAGE:latest .
          docker push $IMAGE:$TAG
          docker push $IMAGE:latest
